<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minecraft Command Helper</title>
  <style>
    :root {
      --bg: #f7fbf2;
      --panel: #ffffff;
      --ink: #243226;
      --muted: #647064;
      --green: #3c8f50;
      --green-dark: #2f7140;
      --blue: #337ab7;
      --yellow: #ffd86b;
      --line: #dce7d7;
      --shadow: 0 18px 42px rgba(38, 80, 44, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 216, 107, 0.22), transparent 280px),
        var(--bg);
    }

    main {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .title {
      margin: 0 0 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 7vw, 4.1rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: clamp(1.05rem, 3vw, 1.35rem);
      font-weight: 700;
    }

    .language-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
      padding: 6px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .language-button {
      min-width: 96px;
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 1.05rem;
      font-weight: 950;
      cursor: pointer;
    }

    .language-button.active {
      background: var(--yellow);
      color: var(--ink);
    }

    .tool {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: clamp(16px, 4vw, 28px);
    }

    .section {
      margin-bottom: 24px;
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 1.25rem;
      font-weight: 900;
    }

    .type-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .quick-button {
      min-height: 72px;
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #fffaf0;
      color: var(--ink);
      font: inherit;
      font-size: clamp(1.05rem, 3.2vw, 1.35rem);
      font-weight: 950;
      cursor: pointer;
      touch-action: manipulation;
    }

    .quick-button:active {
      transform: scale(0.98);
    }

    .type-option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .type-card {
      display: flex;
      min-height: 92px;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #fbfdf8;
      color: var(--ink);
      font-size: clamp(1.35rem, 4vw, 2rem);
      font-weight: 950;
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      user-select: none;
    }

    .type-card:active {
      transform: scale(0.98);
    }

    .type-option input:checked + .type-card {
      border-color: var(--green);
      background: #eaffee;
      box-shadow: inset 0 0 0 4px rgba(60, 143, 80, 0.16);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    select {
      width: 100%;
      min-height: 64px;
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 1.25rem;
      font-weight: 800;
      padding: 10px 44px 10px 14px;
      cursor: pointer;
    }

    .material-groups {
      display: grid;
      gap: 16px;
    }

    .material-group {
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdf8;
    }

    .material-group-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 1.08rem;
      font-weight: 950;
    }

    .material-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .material-button {
      display: flex;
      min-height: 92px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-size: 0.95rem;
      font-weight: 950;
      text-align: center;
      cursor: pointer;
      touch-action: manipulation;
    }

    .material-button.active {
      border-color: var(--green);
      background: #eaffee;
      box-shadow: inset 0 0 0 4px rgba(60, 143, 80, 0.16);
    }

    .material-button:active {
      transform: scale(0.98);
    }

    .block-icon {
      display: block;
      width: 46px;
      height: 46px;
      border: 3px solid rgba(0, 0, 0, 0.2);
      border-radius: 5px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.16) 25%, transparent 25% 50%, rgba(0, 0, 0, 0.08) 50% 75%, transparent 75%),
        linear-gradient(0deg, rgba(255, 255, 255, 0.12) 25%, transparent 25% 50%, rgba(0, 0, 0, 0.08) 50% 75%, transparent 75%),
        var(--block-color, #bbb);
      background-size: 18px 18px, 18px 18px, auto;
      box-shadow:
        inset 8px 8px 0 rgba(255, 255, 255, 0.22),
        inset -8px -8px 0 rgba(0, 0, 0, 0.16);
    }

    select:focus,
    button:focus {
      outline: 4px solid rgba(51, 122, 183, 0.24);
      outline-offset: 3px;
    }

    .copy-button {
      width: 100%;
      min-height: 82px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: #fff;
      font-size: clamp(1.55rem, 5vw, 2.35rem);
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 10px 0 var(--green-dark);
      touch-action: manipulation;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .copy-button:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 var(--green-dark);
    }

    .copy-button.clear {
      background: #d94f3f;
      box-shadow: 0 10px 0 #a93c30;
    }

    .copy-button.home {
      background: var(--blue);
      box-shadow: 0 10px 0 #245984;
    }

    .copy-button.clear:active {
      box-shadow: 0 4px 0 #a93c30;
    }

    .copy-button.home:active {
      box-shadow: 0 4px 0 #245984;
    }

    .status {
      min-height: 34px;
      margin: 18px 0 0;
      color: var(--blue);
      font-size: 1.25rem;
      font-weight: 900;
      text-align: center;
    }

    .command-box {
      margin-top: 22px;
      padding: 16px;
      border: 3px dashed #a7c79d;
      border-radius: 8px;
      background: #fbfff5;
    }

    .command-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 900;
    }

    .command {
      margin: 0;
      color: #183820;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-size: clamp(1.15rem, 4vw, 1.75rem);
      font-weight: 900;
      line-height: 1.35;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .hint {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
    }

    @media (max-width: 640px) {
      main {
        padding: 16px 12px 28px;
      }

      .type-grid,
      .quick-grid,
      .material-grid,
      .form-grid,
      .actions {
        grid-template-columns: 1fr;
      }

      .type-card {
        min-height: 78px;
      }

      select {
        min-height: 60px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="title">
      <h1 data-i18n="title">Minecraft Command Helper</h1>
      <p class="subtitle" data-i18n="subtitle">Pick a shape, copy the command, then paste it in Minecraft</p>
      <div class="language-switch" aria-label="Language">
        <button class="language-button active" id="englishButton" type="button" data-language="en">English</button>
        <button class="language-button" id="chineseButton" type="button" data-language="zh">中文</button>
      </div>
    </header>

    <section class="tool" aria-label="Minecraft Bedrock command generator">
      <div class="section">
        <span class="label" data-i18n="quickPicks">Quick Picks</span>
        <div class="quick-grid">
          <button class="quick-button" type="button" data-preset="smallWoodHouse" data-i18n="smallWoodHouse">Small Wood House 10x10x5</button>
          <button class="quick-button" type="button" data-preset="bigWoodHouse" data-i18n="bigWoodHouse">Big Wood House 20x20x10</button>
          <button class="quick-button" type="button" data-preset="glassHouse" data-i18n="glassHouse">Glass House 15x15x10</button>
          <button class="quick-button" type="button" data-preset="diamondPlatform" data-i18n="diamondPlatform">Diamond Platform 10x10</button>
          <button class="quick-button" type="button" data-preset="castleBase" data-i18n="castleBase">Castle Base 25x25</button>
        </div>
      </div>

      <div class="section">
        <span class="label" data-i18n="buildQuestion">1. What do you want to build?</span>
        <div class="type-grid">
          <label class="type-option">
            <input type="radio" name="buildType" value="platform" checked>
            <span class="type-card" data-i18n="platform">Platform</span>
          </label>
          <label class="type-option">
            <input type="radio" name="buildType" value="house">
            <span class="type-card" data-i18n="hollowHouse">Hollow House</span>
          </label>
        </div>
      </div>

      <div class="section form-grid">
        <div class="field full">
          <label class="label" for="material" data-i18n="blockLabel">2. Block</label>
          <select class="sr-only" id="material" aria-label="Selected block">
            <option value="oak_planks">oak_planks</option>
            <option value="acacia_planks">acacia_planks</option>
            <option value="cherry_planks">cherry_planks</option>
            <option value="dark_oak_planks">dark_oak_planks</option>
            <option value="stone_bricks">stone_bricks</option>
            <option value="deepslate_bricks">deepslate_bricks</option>
            <option value="cobblestone">cobblestone</option>
            <option value="glass">glass</option>
            <option value="amethyst_block">amethyst_block</option>
            <option value="sea_lantern">sea_lantern</option>
            <option value="glowstone">glowstone</option>
            <option value="iron_block">iron_block</option>
            <option value="gold_block">gold_block</option>
            <option value="diamond_block">diamond_block</option>
            <option value="emerald_block">emerald_block</option>
          </select>
          <div class="material-groups" id="materialGroups">
            <div class="material-group">
              <p class="material-group-title" data-i18n="woodGroup">Wood</p>
              <div class="material-grid">
                <button class="material-button" type="button" data-material="oak_planks" style="--block-color: #b8874f;"><span class="block-icon"></span><span data-i18n="oak">Oak</span></button>
                <button class="material-button" type="button" data-material="acacia_planks" style="--block-color: #c56532;"><span class="block-icon"></span><span data-i18n="acacia">Acacia</span></button>
                <button class="material-button" type="button" data-material="cherry_planks" style="--block-color: #f3a8b8;"><span class="block-icon"></span><span data-i18n="cherry">Cherry</span></button>
                <button class="material-button" type="button" data-material="dark_oak_planks" style="--block-color: #4b2f1c;"><span class="block-icon"></span><span data-i18n="darkOak">Dark Oak</span></button>
              </div>
            </div>

            <div class="material-group">
              <p class="material-group-title" data-i18n="stoneGroup">Stone</p>
              <div class="material-grid">
                <button class="material-button" type="button" data-material="stone_bricks" style="--block-color: #858585;"><span class="block-icon"></span><span data-i18n="stoneBricks">Stone Bricks</span></button>
                <button class="material-button" type="button" data-material="deepslate_bricks" style="--block-color: #3d4044;"><span class="block-icon"></span><span data-i18n="deepslateBricks">Deepslate Bricks</span></button>
                <button class="material-button" type="button" data-material="cobblestone" style="--block-color: #777777;"><span class="block-icon"></span><span data-i18n="cobblestone">Cobblestone</span></button>
              </div>
            </div>

            <div class="material-group">
              <p class="material-group-title" data-i18n="prettyGroup">Pretty</p>
              <div class="material-grid">
                <button class="material-button" type="button" data-material="glass" style="--block-color: #bdefff;"><span class="block-icon"></span><span data-i18n="glass">Glass</span></button>
                <button class="material-button" type="button" data-material="amethyst_block" style="--block-color: #8c56c6;"><span class="block-icon"></span><span data-i18n="amethyst">Amethyst</span></button>
                <button class="material-button" type="button" data-material="sea_lantern" style="--block-color: #d7fff6;"><span class="block-icon"></span><span data-i18n="seaLantern">Sea Lantern</span></button>
                <button class="material-button" type="button" data-material="glowstone" style="--block-color: #f2c35b;"><span class="block-icon"></span><span data-i18n="glowstone">Glowstone</span></button>
              </div>
            </div>

            <div class="material-group">
              <p class="material-group-title" data-i18n="preciousGroup">Precious</p>
              <div class="material-grid">
                <button class="material-button" type="button" data-material="iron_block" style="--block-color: #d8d8d8;"><span class="block-icon"></span><span data-i18n="iron">Iron</span></button>
                <button class="material-button" type="button" data-material="gold_block" style="--block-color: #f4cc35;"><span class="block-icon"></span><span data-i18n="gold">Gold</span></button>
                <button class="material-button" type="button" data-material="diamond_block" style="--block-color: #5de0df;"><span class="block-icon"></span><span data-i18n="diamond">Diamond</span></button>
                <button class="material-button" type="button" data-material="emerald_block" style="--block-color: #35c75a;"><span class="block-icon"></span><span data-i18n="emerald">Emerald</span></button>
              </div>
            </div>
          </div>
        </div>

        <div class="field">
          <label class="label" for="length" data-i18n="lengthLabel">3. Length</label>
          <select id="length">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
          </select>
        </div>

        <div class="field">
          <label class="label" for="width" data-i18n="widthLabel">4. Width</label>
          <select id="width">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
          </select>
        </div>

        <div class="field" id="heightField">
          <label class="label" for="height" data-i18n="heightLabel">5. Height</label>
          <select id="height">
            <option value="5" selected>5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="25">25</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button class="copy-button" id="copyButton" type="button" data-i18n="copyBuild">Copy Build Command</button>
        <button class="copy-button clear" id="clearButton" type="button" data-i18n="copyClear">Copy Clear Command</button>
        <button class="copy-button home" id="homeButton" type="button" data-i18n="copyHome">Copy Home Command</button>
      </div>
      <p class="status" id="status" role="status" aria-live="polite"></p>

      <div class="command-box">
        <p class="command-title" data-i18n="buildCommandTitle">Build Command</p>
        <p class="command" id="commandText"></p>
      </div>

      <div class="command-box">
        <p class="command-title" data-i18n="clearCommandTitle">Clear Command</p>
        <p class="command" id="clearCommandText"></p>
      </div>

      <div class="command-box">
        <p class="command-title" data-i18n="homeCommandTitle">Home Command</p>
        <p class="command" id="homeCommandText"></p>
      </div>

      <p class="hint" data-i18n="hint">Platforms appear under your feet. Houses start at your feet and build upward.</p>
    </section>
  </main>

      },
      diamondPlatform: {
        buildType: "platform",
        material: "diamond_block",
        length: "10",
        width: "10",
        height: "5"
      },
      castleBase: {
        buildType: "platform",
        material: "stone_bricks",
        length: "25",
        width: "25",
        height: "5"
      }
    };

    function getBuildType() {
      return document.querySelector('input[name="buildType"]:checked').value;
    }

    function translate(key) {
      return text[currentLanguage][key] || text.en[key] || key;
    }

    function setLanguage(language) {
      currentLanguage = language;
      document.documentElement.lang = language === "zh" ? "zh-Hant" : "en";
      document.title = translate("pageTitle");

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        element.textContent = translate(element.dataset.i18n);
      });

      document.querySelectorAll("[data-language]").forEach((button) => {
        button.classList.toggle("active", button.dataset.language === language);
      });

      statusText.textContent = "";
    }

    function heightToCoordinate(height) {
      const top = Number(height) - 1;
      return top === 0 ? "~" : `~${top}`;
    }

    function makeCommand() {
      const buildType = getBuildType();
      const material = materialSelect.value;
      const [x1, x2] = ranges[lengthSelect.value];
      const [z1, z2] = ranges[widthSelect.value];

      if (buildType === "platform") {
        return `/fill ${x1} ~-1 ${z1} ${x2} ~-1 ${z2} ${material}`;
      }

      return `/fill ${x1} ~ ${z1} ${x2} ${heightToCoordinate(heightSelect.value)} ${z2} ${material} hollow`;
    }

    function makeClearCommand() {
      const buildType = getBuildType();
      const [x1, x2] = ranges[lengthSelect.value];
      const [z1, z2] = ranges[widthSelect.value];

      if (buildType === "platform") {
        return `/fill ${x1} ~-1 ${z1} ${x2} ~-1 ${z2} air`;
      }

      return `/fill ${x1} ~ ${z1} ${x2} ${heightToCoordinate(heightSelect.value)} ${z2} air`;
    }

    function updateMaterialButtons() {
      document.querySelectorAll("[data-material]").forEach((button) => {
        const isActive = button.dataset.material === materialSelect.value;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
      });
    }

    function applyPreset(name) {
      const preset = presets[name];

      if (!preset) {
        return;
      }

      document.querySelector(`input[name="buildType"][value="${preset.buildType}"]`).checked = true;
      materialSelect.value = preset.material;
      lengthSelect.value = preset.length;
      widthSelect.value = preset.width;
      heightSelect.value = preset.height;
      updateCommand();
    }

    function updateCommand() {
      const isHouse = getBuildType() === "house";
      heightField.style.display = isHouse ? "block" : "none";
      commandText.textContent = makeCommand();
      clearCommandText.textContent = makeClearCommand();
      homeCommandText.textContent = homeCommand;
      updateMaterialButtons();
      statusText.textContent = "";
    }

    async function copyText(command) {
      try {
        await navigator.clipboard.writeText(command);
      } catch (error) {
        const temporaryInput = document.createElement("textarea");
        temporaryInput.value = command;
        temporaryInput.setAttribute("readonly", "");
        temporaryInput.style.position = "fixed";
        temporaryInput.style.opacity = "0";
        document.body.appendChild(temporaryInput);
        temporaryInput.select();
        document.execCommand("copy");
        document.body.removeChild(temporaryInput);
      }
    }

    async function copyCommand() {
      await copyText(makeCommand());
      statusText.textContent = translate("copiedBuild");
    }

    async function copyClearCommand() {
      await copyText(makeClearCommand());
      statusText.textContent = translate("copiedClear");
    }

    async function copyHomeCommand() {
      await copyText(homeCommand);
      statusText.textContent = translate("copiedHome");
    }

    document.querySelectorAll("[data-language]").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.language));
    });
    document.querySelectorAll("[data-preset]").forEach((button) => {
      button.addEventListener("click", () => applyPreset(button.dataset.preset));
    });
    document.querySelectorAll("[data-material]").forEach((button) => {
      button.addEventListener("click", () => {
        materialSelect.value = button.dataset.material;
        updateCommand();
      });
    });
    buildTypeInputs.forEach((input) => input.addEventListener("change", updateCommand));
    [materialSelect, lengthSelect, widthSelect, heightSelect].forEach((select) => {
      select.addEventListener("change", updateCommand);
    });
    copyButton.addEventListener("click", copyCommand);
    clearButton.addEventListener("click", copyClearCommand);
    homeButton.addEventListener("click", copyHomeCommand);

    setLanguage(currentLanguage);
    updateCommand();
  </script>
</body>
</html>
